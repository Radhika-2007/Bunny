
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Bunny Greeting</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #ffd6ec,
        #d8c6ff,
        #cce7ff
    );
}

/* Floating Hearts */

.heart{
    position:absolute;
    font-size:35px;
    animation:float 6s linear infinite;
}

.h1{left:10%;}
.h2{
    left:80%;
    animation-delay:2s;
}
.h3{
    left:50%;
    animation-delay:4s;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}

/* Stars */

.stars{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:28px;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    50%{
        opacity:.3;
    }
}

.container{
    text-align:center;
}

/* Speech Bubble */

.speech{
    background:white;
    padding:15px 25px;
    border-radius:30px;
    display:inline-block;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* Bunny */

.bunny{
    position:relative;
    width:200px;
    margin:auto;
}

.ears{
    display:flex;
    justify-content:center;
    gap:25px;
}

.ear{
    width:45px;
    height:110px;
    background:white;
    border-radius:50px;
    position:relative;
}

.ear::before{
    content:"";
    position:absolute;
    width:22px;
    height:75px;
    background:#ffb6c1;
    border-radius:50px;
    top:10px;
    left:11px;
}

.face{
    width:200px;
    height:200px;
    background:white;
    border-radius:50%;
    margin-top:-10px;
    position:relative;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

/* Eyes */

.eyes{
    display:flex;
    justify-content:center;
    gap:45px;
    padding-top:65px;
}

.eyes span{
    width:18px;
    height:22px;
    background:black;
    border-radius:50%;
    position:relative;
}

.eyes span::after{
    content:"";
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    top:3px;
    left:3px;
}

/* Blush */

.blush{
    position:absolute;
    width:22px;
    height:12px;
    background:#ffb6c1;
    border-radius:50%;
    top:105px;
}

.left{
    left:35px;
}

.right{
    right:35px;
}

/* Nose */

.nose{
    width:14px;
    height:14px;
    background:pink;
    border-radius:50%;
    margin:15px auto;
}

/* Mouth */

.mouth{
    width:40px;
    height:20px;
    border-bottom:3px solid #444;
    border-radius:0 0 50px 50px;
    margin:auto;
}

/* Paw */

.paw{
    position:absolute;
    right:-20px;
    top:85px;
    font-size:40px;
    transform-origin:bottom left;
    animation:wave 1s infinite;
}

@keyframes wave{
    0%{transform:rotate(0deg);}
    25%{transform:rotate(25deg);}
    50%{transform:rotate(-25deg);}
    75%{transform:rotate(25deg);}
    100%{transform:rotate(0deg);}
}

/* Button */

.cute-btn{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff69b4;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.cute-btn:hover{
    transform:scale(1.1);
}

/* Hidden Message */

#message{
    display:none;
    margin-top:20px;
    font-size:34px;
    font-weight:bold;
    color:#ff3366;
    animation:pop .8s ease;
}

@keyframes pop{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Flowers */

.grass{
    margin-top:25px;
    font-size:42px;
}

</style>
</head>

<body>

<div class="stars">
✨ ✨ ⭐ ✨ ⭐ ✨
</div>

<div class="heart h1">💖</div>
<div class="heart h2">💕</div>
<div class="heart h3">💜</div>

<div class="container">

<div class="speech">
👋 Hi! Welcome!
</div>

<div class="bunny">

<div class="ears">
<div class="ear"></div>
<div class="ear"></div>
</div>

<div class="face">

<div class="blush left"></div>
<div class="blush right"></div>

<div class="eyes">
<span></span>
<span></span>
</div>

<div class="nose"></div>

<div class="mouth"></div>

<div class="paw">🐾</div>

</div>

</div>

<button class="cute-btn" onclick="showMessage()">
🐰 Click Me
</button>

<div id="message">
Hiii Cutie ❤️
</div>

<div class="grass">
🌸 🌷 🌼 🌺 🌻 🌷 🌸
</div>

</div>

<script>
function showMessage(){
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
